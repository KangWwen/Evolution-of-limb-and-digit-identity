NodeName=cpu01 CPUs=128 SocketsPerBoard=2 CoresPerSocket=64 ThreadsPerCore=1 RealMemory=500000 Weight=60
NodeName=cpu[02-15] CPUs=128 SocketsPerBoard=2 CoresPerSocket=64 ThreadsPerCore=1 RealMemory=500000 Weight=60
NodeName=cpu[16-17] CPUs=192 SocketsPerBoard=2 CoresPerSocket=96 ThreadsPerCore=1 RealMemory=1100000 Weight=60
NodeName=mem01 CPUs=88 SocketsPerBoard=4 CoresPerSocket=22 ThreadsPerCore=1 RealMemory=6000000 Weight=60
NodeName=gpu[02-08] CPUs=36 SocketsPerBoard=2 CoresPerSocket=18 ThreadsPerCore=1 RealMemory=500000 Gres=gpu:8 Weight=60
NodeName=gpu01 CPUs=36 SocketsPerBoard=2 CoresPerSocket=18 ThreadsPerCore=1 RealMemory=500000 Gres=gpu:8 Weight=60


PartitionName=short Nodes=cpu01 MaxCPUsPerNode=128 MaxTime=12:00:00 DefMemPerCPU=2000 State=UP  AllowQos=ALL
