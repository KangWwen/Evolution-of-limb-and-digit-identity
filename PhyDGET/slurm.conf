ClusterName=cluster
AccountingStorageEnforce = associations,limits,qos
ControlMachine=mgt01
ControlAddr=172.16.0.1
BackupController=mgt02
BackupAddr=172.16.0.2
SlurmdUser=root
SlurmctldPort=6817
SlurmdPort=6818
AuthType=auth/munge
StateSaveLocation=/var/spool/slurm/ctld
SlurmdSpoolDir=/var/spool/slurm/d
SwitchType=switch/none
#Prolog=/etc/slurm/slurm.prolog
MpiDefault=none
ProctrackType=proctrack/cgroup
ReturnToService=2
PrologFlags=contain
SlurmctldTimeout=300
SlurmdTimeout=300
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0
PriorityDecayHalfLife = 14-0
PriorityFavorSmall = yes
PriorityFlags = ACCRUE_ALWAYS,FAIR_TREE
PriorityMaxAge = 14-0
PriorityType = priority/multifactor
PriorityWeightAge = 1000
PriorityWeightFairshare = 15000
PriorityWeightJobSize = 1000
PriorityWeightPartition = 1000
PriorityWeightQOS = 0
SchedulerType=sched/builtin
SelectType=select/cons_res
SelectTypeParameters=CR_CPU_Memory
SlurmctldDebug=3
SlurmctldLogFile=/var/log/slurmctld.log
SlurmdDebug=3
SlurmdLogFile=/var/log/slurmd.log
JobSubmitPlugins = lua
JobCompType=jobcomp/none
JobAcctGatherType=jobacct_gather/cgroup
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=mgt01
AccountingStoragePass=/var/run/munge/munge.socket.2
GresTypes=gpu
TaskPlugin=task/cgroup
AccountingStorageTRES=gres/gpu
